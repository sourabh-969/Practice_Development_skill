<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>addEventListener</title>
    <style>
        #container{
            height: 100vh;
            display: grid;
        }
        #openbox{
            width: 25rem;
            margin: auto;
            padding: 2rem;
            text-align: center;
            font-weight: 200;
            font-size: 2rem;
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(46, 194, 194);
        &:active{
            background-color: rgb(79, 221, 173);
        }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="openbox">Open the box</div>
    </div>
    <script>
        let openBox = document.querySelector("#openbox");
        openbox.addEventListener("click",function(){window.alert("I want to open the box!")})
    </script>
</body>
</html>
